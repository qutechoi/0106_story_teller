<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 기반 이야기 생성 플랫폼">
    <title>Story Teller - AI Story Generator</title>

    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Story Teller</h1>
            <p>현실감 넘치는 재미있는 이야기 제작소</p>
        </div>

        <div class="content">
            <!-- Server Status -->
            <div class="config-section">
                <div id="statusBadge" class="status-badge">
                    <span class="indicator"></span>
                    <span id="statusText">서버 확인 중...</span>
                </div>
            </div>

            <!-- Input -->
            <div class="input-group">
                <label for="topic">어떤 이야기를 듣고 싶으신가요?</label>
                <textarea
                    id="topic"
                    placeholder="예: 비 오는 날 편의점에서 마주친 첫사랑, 지하철에서 잃어버린 에어팟 한 짝..."
                    maxlength="500"
                ></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> / 500
                </div>
            </div>

            <button id="generateBtn" class="btn-primary">
                <span class="loader" id="loader"></span>
                <span id="btnText">이야기 만들기</span>
            </button>

            <!-- Output -->
            <div class="output-section" id="outputSection">
                <div class="story-header">
                    <h2>✨ 생성된 이야기</h2>
                    <button id="copyBtn" class="btn-copy" title="복사하기">📋</button>
                </div>
                <div class="story-content" id="storyContent">
                    <!-- Story will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="/js/app.js"></script>

</body>

</html>
