<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="styles/book.css">
</head>
<body>

  <!-- 표지 -->
  <section class="cover">
    <!-- 배경 아트: 지식 그래프 노드+연결선 -->
    <svg class="cover-bg-art" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
      <!-- 연결선 -->
      <line x1="120" y1="180" x2="280" y2="260" stroke="#b794f4" stroke-width="1" opacity="0.18"/>
      <line x1="280" y1="260" x2="420" y2="200" stroke="#b794f4" stroke-width="1" opacity="0.15"/>
      <line x1="420" y1="200" x2="500" y2="340" stroke="#b794f4" stroke-width="1" opacity="0.12"/>
      <line x1="280" y1="260" x2="350" y2="420" stroke="#b794f4" stroke-width="1" opacity="0.15"/>
      <line x1="80" y1="450" x2="200" y2="380" stroke="#b794f4" stroke-width="1" opacity="0.12"/>
      <line x1="200" y1="380" x2="280" y2="260" stroke="#b794f4" stroke-width="1" opacity="0.10"/>
      <line x1="350" y1="420" x2="480" y2="500" stroke="#b794f4" stroke-width="1" opacity="0.12"/>
      <line x1="150" y1="600" x2="350" y2="420" stroke="#b794f4" stroke-width="1" opacity="0.10"/>
      <line x1="480" y1="500" x2="520" y2="650" stroke="#b794f4" stroke-width="1" opacity="0.08"/>
      <line x1="120" y1="180" x2="200" y2="380" stroke="#b794f4" stroke-width="1" opacity="0.10"/>
      <line x1="420" y1="200" x2="350" y2="420" stroke="#b794f4" stroke-width="1" opacity="0.08"/>
      <line x1="80" y1="450" x2="150" y2="600" stroke="#b794f4" stroke-width="1" opacity="0.10"/>
      <!-- 노드들 -->
      <circle cx="120" cy="180" r="8" fill="#9f7aea" opacity="0.20"/>
      <circle cx="280" cy="260" r="12" fill="#7c3aed" opacity="0.22"/>
      <circle cx="420" cy="200" r="7" fill="#9f7aea" opacity="0.18"/>
      <circle cx="500" cy="340" r="6" fill="#b794f4" opacity="0.15"/>
      <circle cx="200" cy="380" r="9" fill="#9f7aea" opacity="0.16"/>
      <circle cx="350" cy="420" r="10" fill="#7c3aed" opacity="0.18"/>
      <circle cx="80" cy="450" r="5" fill="#b794f4" opacity="0.14"/>
      <circle cx="480" cy="500" r="7" fill="#9f7aea" opacity="0.15"/>
      <circle cx="150" cy="600" r="8" fill="#b794f4" opacity="0.12"/>
      <circle cx="520" cy="650" r="5" fill="#9f7aea" opacity="0.10"/>
      <!-- 작은 점들 -->
      <circle cx="50" cy="120" r="3" fill="#c4b5fd" opacity="0.20"/>
      <circle cx="540" cy="140" r="3" fill="#c4b5fd" opacity="0.18"/>
      <circle cx="300" cy="100" r="2" fill="#c4b5fd" opacity="0.15"/>
      <circle cx="450" cy="600" r="3" fill="#c4b5fd" opacity="0.12"/>
      <circle cx="100" cy="700" r="2" fill="#c4b5fd" opacity="0.10"/>
      <circle cx="380" cy="680" r="3" fill="#c4b5fd" opacity="0.10"/>
    </svg>

    <div class="cover-content">
      <!-- 보석 아이콘 -->
      <svg class="cover-gem-icon" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#9f7aea;stop-opacity:1"/>
            <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1"/>
          </linearGradient>
          <linearGradient id="gem-face" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#9f7aea;stop-opacity:0.6"/>
          </linearGradient>
        </defs>
        <!-- 보석 하단면 -->
        <polygon points="40,72 10,32 28,22 52,22 70,32" fill="url(#gem-grad)"/>
        <!-- 보석 상단면 -->
        <polygon points="10,32 28,22 40,30 28,38" fill="url(#gem-face)"/>
        <polygon points="28,22 52,22 40,30" fill="#ddd6fe" opacity="0.5"/>
        <polygon points="52,22 70,32 52,38 40,30" fill="url(#gem-face)" opacity="0.8"/>
        <!-- 보석 하단 면들 -->
        <polygon points="10,32 28,38 40,72" fill="#7c3aed" opacity="0.7"/>
        <polygon points="28,38 40,30 52,38 40,72" fill="#6d28d9" opacity="0.6"/>
        <polygon points="52,38 70,32 40,72" fill="#5b21b6" opacity="0.8"/>
        <!-- sparkle -->
        <circle cx="32" cy="26" r="2" fill="white" opacity="0.7"/>
        <circle cx="24" cy="30" r="1" fill="white" opacity="0.5"/>
      </svg>

      <h1 class="cover-title-main">{{TITLE}}</h1>
      <p class="cover-subtitle">— {{SUBTITLE}} —</p>
      <p class="cover-tagline">설치부터 실전 활용까지,<br>세 가지 노트 앱으로 완성하는<br>나만의 지식 관리 시스템</p>
      <p class="cover-author">{{AUTHOR}}</p>
    </div>
  </section>

  <!-- 목차 -->
  <section class="toc">
    <h1>목차</h1>
    {{TOC}}
  </section>

  <!-- 머리말 -->
  <section class="preface">
    <h1>머리말</h1>
    {{PREFACE}}
  </section>

  <!-- 본문 -->
  {{CHAPTERS}}

  <!-- 부록 -->
  <section class="appendix">
    <h1>부록: 용어집</h1>
    {{APPENDIX}}
  </section>

</body>
</html>
